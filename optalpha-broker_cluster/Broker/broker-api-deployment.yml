apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker-api-deployment
  namespace: optalpha-deployment
  annotations:
    another-autoscaler/start-time: "45 22 * * *"
    another-autoscaler/start-replicas: "1"
    another-autoscaler/stop-time: "35 22 * * *"
    another-autoscaler/stop-replicas: "0"
  labels:
    app: broker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broker-api
  template:
    metadata:
      labels:
        app: broker-api
    spec:
      containers:
        - name: broker-api-zero-nine
          image: rpv123/optalpha-broker-server:broker-api-.9
          env:
            - name: host
              value: ""
            - name: port_postgres
              value: "0"
            - name: username
              value: ""
            - name: password
              value: ""
            - name: token
              value: ""
            - name: chat_id
              value: ""
          ports:
            - containerPort: 7777
